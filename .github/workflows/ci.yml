name: CI

# CI propio del BFF (complementa el auto-deploy de Render, no lo reemplaza).
# Corre en cada push y PR sobre las tres ramas de larga vida.
on:
  push:
    branches: [main, QA, Dev]
  pull_request:
    branches: [main, QA, Dev]

jobs:
  build:
    name: Lint, import y build de Docker
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Chequeo de arranque (import de la app)
        run: python -c "import app.main"

      - name: Build de la imagen Docker (mismo Dockerfile que Render)
        run: docker build -t bff-ci .
